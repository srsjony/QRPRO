services:
  - type: web
    name: qr-menu-system
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: flask --app app:create_app db upgrade && gunicorn app:app
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.19
    autoDeploy: true
