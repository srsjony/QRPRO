{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
<div style="display:grid; gap:10px; margin: 0 0 18px;">
  {% for category, message in messages %}
  <div style="padding:12px 14px; border-radius:12px; border:1px solid {% if category == 'error' %}rgba(239,68,68,0.35){% else %}rgba(34,197,94,0.35){% endif %}; background:{% if category == 'error' %}rgba(239,68,68,0.08){% else %}rgba(34,197,94,0.08){% endif %}; color:inherit;">
    {{ message }}
  </div>
  {% endfor %}
</div>
{% endif %}
{% endwith %}
