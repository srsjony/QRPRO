<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(150deg, #edf2ff, #f8f9fd);
        }

        .card {
            width: min(460px, 100%);
            background: #fff;
            border: 1px solid #e6eaf3;
            border-radius: 14px;
            padding: 20px;
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.1);
            animation: fadeUp 0.4s ease both;
        }

        h2 {
            margin: 0 0 14px;
        }

        label {
            display: block;
            font-size: 14px;
            margin-bottom: 6px;
            color: #4e5776;
        }

        input {
            width: 100%;
            padding: 11px;
            border-radius: 9px;
            border: 1px solid #ccd3e7;
            margin-bottom: 12px;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 11px;
            border: none;
            border-radius: 9px;
            background: #667eea;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, background 0.2s ease;
        }

        button:hover {
            background: #5566d2;
            transform: translateY(-1px);
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="card">
        <h2>Add Menu Item</h2>
        {% include 'flash_messages.html' %}

        <form method="POST">
            {% include 'csrf_field.html' %}
            <label>Restaurant Name</label>
            <input name="restaurant" required>

            <label>Item Name</label>
            <input name="item" required>

            <label>Price</label>
            <input name="price" required>

            <label>Category</label>
            <input name="category" required>

            <button type="submit">Add</button>
        </form>
    </div>

    {% include 'sr_footer.html' %}
</body>

</html>
