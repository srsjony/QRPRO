<style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&display=swap');

    /* SR SOFTWARE ANIMATION STYLES */
    #sr-panel {
        overflow: hidden;
        background: #000;
    }

    #bg,
    #particles,
    .scanlines {
        position: absolute;
        inset: 0;
        z-index: 0;
        pointer-events: none;
    }

    #particles {
        z-index: 1;
    }

    .scanlines {
        z-index: 100;
        background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, 0.08) 2px, rgba(0, 0, 0, 0.08) 4px);
        animation: scanMove 8s linear infinite;
    }

    .scene {
        position: absolute;
        inset: 0;
        z-index: 2;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .logo-core {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    /* Main SR text */
    .sr-text {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 200px;
        line-height: 1;
        position: relative;
        z-index: 10;
        color: #fff;
        letter-spacing: -8px;
        animation: breathe 3s ease-in-out infinite;
    }

    .sr-text .s {
        display: inline-block;
        background: linear-gradient(135deg, #ff0080, #ff6a00);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        filter: drop-shadow(0 0 30px #ff0080) drop-shadow(0 0 60px #ff0080);
        animation: glitch-s 4s infinite;
    }

    .sr-text .r {
        display: inline-block;
        background: linear-gradient(135deg, #00f5ff, #0080ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        filter: drop-shadow(0 0 30px #00f5ff) drop-shadow(0 0 60px #00f5ff);
        animation: glitch-r 4s infinite 0.1s;
    }

    @keyframes breathe {

        0%,
        100% {
            transform: scale(1)
        }

        50% {
            transform: scale(1.04)
        }
    }

    @keyframes glitch-s {

        0%,
        90%,
        100% {
            transform: translate(0, 0) skew(0deg)
        }

        91% {
            transform: translate(-4px, 2px) skew(-3deg);
            filter: drop-shadow(-4px 0 #00f5ff) drop-shadow(4px 0 #ff0080)
        }

        92% {
            transform: translate(4px, -2px) skew(3deg)
        }

        93% {
            transform: translate(-2px, 0) skew(0deg)
        }

        94% {
            transform: translate(0, 0)
        }
    }

    @keyframes glitch-r {

        0%,
        90%,
        100% {
            transform: translate(0, 0) skew(0deg)
        }

        91% {
            transform: translate(4px, -2px) skew(3deg);
            filter: drop-shadow(4px 0 #ff0080) drop-shadow(-4px 0 #00f5ff)
        }

        92% {
            transform: translate(-4px, 2px) skew(-3deg)
        }

        93% {
            transform: translate(2px, 0)
        }

        94% {
            transform: translate(0, 0)
        }
    }

    /* Orbiting rings */
    .rings {
        position: absolute;
        width: 320px;
        height: 320px
    }

    .ring {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 1.5px solid transparent
    }

    .ring1 {
        background: conic-gradient(from 0deg, #ff0080, #ff6a00, transparent 60%) border-box;
        -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
        mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: destination-out;
        mask-composite: exclude;
        animation: spin1 2s linear infinite;
    }

    .ring2 {
        inset: 20px;
        background: conic-gradient(from 180deg, #00f5ff, #0080ff, transparent 60%) border-box;
        -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
        mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: destination-out;
        mask-composite: exclude;
        animation: spin1 3s linear infinite reverse;
    }

    .ring3 {
        inset: 40px;
        background: conic-gradient(from 90deg, #aaff00, #00f5ff, transparent 50%) border-box;
        -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
        mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: destination-out;
        mask-composite: exclude;
        animation: spin1 1.5s linear infinite;
        opacity: 0.6;
    }

    @keyframes spin1 {
        to {
            transform: rotate(360deg)
        }
    }

    /* Orbiting dots */
    .orbit-dot {
        position: absolute;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        top: 50%;
        left: 50%;
        margin: -5px
    }

    .od1 {
        background: #ff0080;
        box-shadow: 0 0 15px #ff0080, 0 0 30px #ff0080;
        animation: orbit1 2s linear infinite
    }

    .od2 {
        background: #00f5ff;
        box-shadow: 0 0 15px #00f5ff, 0 0 30px #00f5ff;
        animation: orbit1 3s linear infinite reverse;
        width: 7px;
        height: 7px;
        margin: -3.5px
    }

    .od3 {
        background: #aaff00;
        box-shadow: 0 0 12px #aaff00;
        animation: orbit1 4s linear infinite;
        width: 5px;
        height: 5px;
        margin: -2.5px
    }

    @keyframes orbit1 {
        0% {
            transform: rotate(0deg) translate(140px) rotate(0deg)
        }

        100% {
            transform: rotate(360deg) translate(140px) rotate(-360deg)
        }
    }

    @keyframes orbit2 {
        0% {
            transform: rotate(0deg) translate(120px) rotate(0deg)
        }

        100% {
            transform: rotate(360deg) translate(120px) rotate(-360deg)
        }
    }

    @keyframes orbit3 {
        0% {
            transform: rotate(0deg) translate(100px) rotate(0deg)
        }

        100% {
            transform: rotate(360deg) translate(100px) rotate(-360deg)
        }
    }

    .od2 {
        animation: orbit2 3s linear infinite reverse
    }

    .od3 {
        animation: orbit3 4s linear infinite 1s
    }

    /* Wordmark below */
    .wordmark {
        position: absolute;
        bottom: -70px;
        left: 50%;
        transform: translateX(-50%);
        white-space: nowrap;
        text-align: center;
    }

    .wm-title {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 22px;
        letter-spacing: 14px;
        color: #fff;
        opacity: 0.9;
        text-transform: uppercase;
        animation: flicker 6s infinite;
    }

    .wm-sub {
        font-family: 'Share Tech Mono', monospace;
        font-size: 9px;
        letter-spacing: 5px;
        color: #00f5ff;
        opacity: 0.6;
        margin-top: 4px;
    }

    @keyframes flicker {

        0%,
        95%,
        100% {
            opacity: 0.9
        }

        96% {
            opacity: 0.2
        }

        97% {
            opacity: 0.9
        }

        98% {
            opacity: 0.1
        }

        99% {
            opacity: 0.8
        }
    }

    /* Corner decorations */
    .corner {
        position: absolute;
        width: 80px;
        height: 80px;
        z-index: 50;
        pointer-events: none;
    }

    .corner::before,
    .corner::after {
        content: '';
        position: absolute;
        background: #00f5ff;
        opacity: 0.5;
        animation: cornerPulse 2s ease-in-out infinite
    }

    .corner::before {
        width: 2px;
        height: 40px
    }

    .corner::after {
        width: 40px;
        height: 2px
    }

    .c-tl {
        top: 20px;
        left: 20px
    }

    .c-tr {
        top: 20px;
        right: 20px;
        transform: scaleX(-1)
    }

    .c-bl {
        bottom: 20px;
        left: 20px;
        transform: scaleY(-1)
    }

    .c-br {
        bottom: 20px;
        right: 20px;
        transform: scale(-1)
    }

    @keyframes cornerPulse {

        0%,
        100% {
            opacity: 0.3
        }

        50% {
            opacity: 0.8
        }
    }

    @keyframes scanMove {
        0% {
            background-position: 0 0
        }

        100% {
            background-position: 0 100px
        }
    }

    .panel-left .logo-core {
        transform: scale(0.65);
    }

    .login-card .logo-core {
        transform: scale(0.35);
    }

    .login-card .corner {
        transform: scale(0.5);
        transform-origin: top left;
    }

    .login-card .c-tr {
        transform: scale(-0.5, 0.5);
        transform-origin: top right;
    }

    .login-card .c-bl {
        transform: scale(0.5, -0.5);
        transform-origin: bottom left;
    }

    .login-card .c-br {
        transform: scale(-0.5, -0.5);
        transform-origin: bottom right;
    }
</style>

<canvas id="bg"></canvas>
<canvas id="particles"></canvas>
<div class="scanlines"></div>

<div class="corner c-tl"></div>
<div class="corner c-tr"></div>
<div class="corner c-bl"></div>
<div class="corner c-br"></div>

<div class="scene">
    <div class="logo-core">
        <div class="rings">
            <div class="ring ring1"></div>
            <div class="ring ring2"></div>
            <div class="ring ring3"></div>
            <div class="orbit-dot od1"></div>
            <div class="orbit-dot od2"></div>
            <div class="orbit-dot od3"></div>
        </div>
        <div class="sr-text">
            <span class="s">S</span><span class="r">R</span>
        </div>
        <div class="wordmark">
            <div class="wm-title">Software</div>
            <div class="wm-sub">SYSTEM // ONLINE // v2.0</div>
        </div>
    </div>
</div>

<script>
    // ── SR SOFTWARE ANIMATION SCRIPT ──
    document.addEventListener("DOMContentLoaded", function () {
        const panel = document.getElementById('sr-panel');
        if (panel) {
            const bg = document.getElementById('bg');
            const bctx = bg.getContext('2d');
            const pc = document.getElementById('particles');
            const pctx = pc.getContext('2d');

            let cx, cy;
            let parts = [];
            let lightnings = [];
            let waves = [];

            function initCanvas() {
                bg.width = pc.width = panel.clientWidth;
                bg.height = pc.height = panel.clientHeight;
                cx = pc.width / 2;
                cy = pc.height / 2;
            }
            initCanvas();
            window.addEventListener('resize', initCanvas);

            const chars = 'SR01アイウエオカキクケコサシスセソ∑∆Ω∇';
            let drops = [];
            function initMatrix() {
                const cols = Math.floor(bg.width / 18) + 1;
                drops = Array(cols).fill(1);
            }
            initMatrix();
            window.addEventListener('resize', initMatrix);

            function drawMatrix() {
                bctx.fillStyle = 'rgba(0,0,0,0.05)';
                bctx.fillRect(0, 0, bg.width, bg.height);
                drops.forEach((y, i) => {
                    const ch = chars[Math.floor(Math.random() * chars.length)];
                    const brightness = Math.random();
                    bctx.fillStyle = brightness > 0.95 ? '#ffffff' :
                        brightness > 0.7 ? '#00f5ff' : '#004455';
                    bctx.font = '14px Share Tech Mono';
                    bctx.fillText(ch, i * 18, y * 18);
                    if (y * 18 > bg.height && Math.random() > 0.975) drops[i] = 0;
                    drops[i]++;
                });
            }
            setInterval(drawMatrix, 50);

            class Particle {
                constructor(x, y, burst) {
                    this.x = x; this.y = y;
                    const angle = Math.random() * Math.PI * 2;
                    const speed = burst ? 2 + Math.random() * 8 : 0.2 + Math.random() * 1.5;
                    this.vx = Math.cos(angle) * speed;
                    this.vy = Math.sin(angle) * speed;
                    this.life = 1;
                    this.decay = burst ? 0.012 + Math.random() * 0.02 : 0.004 + Math.random() * 0.006;
                    this.size = burst ? 1.5 + Math.random() * 3 : 1 + Math.random() * 2;
                    const palette = ['#ff0080', '#ff6a00', '#00f5ff', '#0080ff', '#aaff00', '#fff'];
                    this.color = palette[Math.floor(Math.random() * palette.length)];
                    this.burst = burst;
                }
                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    if (!this.burst) { this.vx *= 0.99; this.vy *= 0.99; }
                    else { this.vy += 0.08; }
                    this.life -= this.decay;
                }
                draw() {
                    pctx.save();
                    pctx.globalAlpha = Math.max(0, this.life);
                    pctx.shadowBlur = 12;
                    pctx.shadowColor = this.color;
                    pctx.fillStyle = this.color;
                    pctx.beginPath();
                    pctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    pctx.fill();
                    pctx.restore();
                }
            }

            function spawnAmbient() {
                const angle = Math.random() * Math.PI * 2;
                const r = (panel.clientWidth > 400 ? 130 : 50) + Math.random() * 20;
                parts.push(new Particle(cx + Math.cos(angle) * r, cy + Math.sin(angle) * r, false));
            }
            setInterval(spawnAmbient, 40);

            function burstFn() {
                for (let i = 0; i < 80; i++) parts.push(new Particle(cx, cy, true));
            }
            burstFn();
            setInterval(burstFn, 4000);

            class Lightning {
                constructor() {
                    this.points = this.generate();
                    this.life = 1;
                    this.color = Math.random() > 0.5 ? '#ff0080' : '#00f5ff';
                }
                generate() {
                    const pts = [{ x: cx, y: cy }];
                    const angle = Math.random() * Math.PI * 2;
                    let x = cx, y = cy;
                    for (let i = 0; i < 8; i++) {
                        x += Math.cos(angle + (Math.random() - 0.5) * 1.5) * (20 + Math.random() * 30);
                        y += Math.sin(angle + (Math.random() - 0.5) * 1.5) * (20 + Math.random() * 30);
                        pts.push({ x, y });
                    }
                    return pts;
                }
                draw() {
                    pctx.save();
                    pctx.globalAlpha = this.life * 0.8;
                    pctx.strokeStyle = this.color;
                    pctx.lineWidth = 1.5;
                    pctx.shadowBlur = 20;
                    pctx.shadowColor = this.color;
                    pctx.beginPath();
                    pctx.moveTo(this.points[0].x, this.points[0].y);
                    this.points.forEach(p => pctx.lineTo(p.x, p.y));
                    pctx.stroke();
                    pctx.restore();
                    this.life -= 0.08;
                }
            }

            setInterval(() => { if (Math.random() > 0.3) lightnings.push(new Lightning()); }, 200);

            class Shockwave {
                constructor() { this.r = 0; this.life = 1; this.color = Math.random() > 0.5 ? '#ff0080' : '#00f5ff' }
                draw() {
                    pctx.save();
                    pctx.globalAlpha = this.life * 0.4;
                    pctx.strokeStyle = this.color;
                    pctx.lineWidth = 2;
                    pctx.shadowBlur = 20; pctx.shadowColor = this.color;
                    pctx.beginPath();
                    pctx.arc(cx, cy, this.r, 0, Math.PI * 2);
                    pctx.stroke();
                    pctx.restore();
                    this.r += 4; this.life -= 0.02;
                }
            }
            setInterval(() => waves.push(new Shockwave()), 800);
            burstFn();

            function animate() {
                pctx.clearRect(0, 0, pc.width, pc.height);
                parts = parts.filter(p => { p.update(); p.draw(); return p.life > 0; });
                lightnings = lightnings.filter(l => { l.draw(); return l.life > 0; });
                waves = waves.filter(w => { w.draw(); return w.life > 0; });
                requestAnimationFrame(animate);
            }
            animate();

            panel.addEventListener('click', e => {
                const rect = panel.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                for (let i = 0; i < 50; i++) parts.push(new Particle(x, y, true));
                waves.push(new Shockwave());
            });
        }
    });
</script>
