<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>QR Menu System - Software</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Sans:wght@400;500;700&display=swap');

        :root {
            --obsidian: #0b0a09;
            --ember: #c8873a;
            --ember-glow: #e0a050;
            --cream: #f2e8d9;
            --cream-muted: #b8a898;
            --divider: rgba(200, 135, 58, 0.18);
            --ff-display: 'Cormorant Garamond', Georgia, serif;
            --ff-body: 'DM Sans', system-ui, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--obsidian);
            font-family: var(--ff-body);
            color: var(--cream);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* ── NAV ─────────────────────────────────── */
        .nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(11, 10, 9, 0.92);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--divider);
            padding: 0 24px;
            height: 62px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-shrink: 0;
        }

        .nav-brand {
            font-family: var(--ff-display);
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--ember-glow);
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-chip {
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            padding: 7px 14px;
            border-radius: 999px;
            text-decoration: none;
            cursor: pointer;
            border: 1px solid var(--divider);
            transition: all 0.2s ease;
            white-space: nowrap;
            background: transparent;
            color: var(--cream-muted);
        }

        .nav-chip.active {
            border-color: var(--ember);
            color: var(--ember-glow);
        }

        .nav-chip:hover {
            border-color: var(--ember);
            color: var(--ember-glow);
        }

        .nav-chip.danger {
            color: #fca5a5;
            background: rgba(239, 68, 68, 0.08);
            border-color: rgba(239, 68, 68, 0.2);
        }

        .nav-chip.danger:hover {
            background: rgba(239, 68, 68, 0.15);
            border-color: rgba(239, 68, 68, 0.4);
        }

        /* ── IFRAME ──────────────────────────────── */
        .content-frame {
            flex: 1;
            width: 100%;
            border: none;
            background: var(--obsidian);
        }
    </style>
</head>

<body>

    <nav class="nav">
        <div class="nav-brand">Restromate</div>
        <div class="nav-actions">
            <!-- Target the iframe for seamless software-like navigation -->
            <a href="/dashboard?embedded=true" target="main-content" class="nav-chip active"
                onclick="setActive(this)">Dashboard</a>
            <a href="/inventory?embedded=true" target="main-content" class="nav-chip"
                onclick="setActive(this)">Inventory</a>
            <a href="/kitchen/{{session['username']}}?embedded=true" target="main-content" class="nav-chip"
                onclick="setActive(this)">Kitchen</a>
            <a href="/billing?embedded=true" target="main-content" class="nav-chip"
                onclick="setActive(this)">Billing</a>
            <a href="/orders?embedded=true" target="main-content" class="nav-chip" onclick="setActive(this)">Order
                History</a>
            <a href="/logout" class="nav-chip danger">Logout</a>
        </div>
    </nav>

    <!-- The Master Frame where all interior screens load -->
    <iframe src="/dashboard?embedded=true" name="main-content" id="main-content" class="content-frame"></iframe>

    <!-- Toast notification container -->
    <div id="toastContainer" style="position:fixed; top:70px; right:20px; z-index:9999; display:flex; flex-direction:column; gap:8px;"></div>

    <script>
        const USERNAME = '{{session["username"]}}';
        let knownOrderIds = new Set();
        let firstLoad = true;
        let audioCtx = null;

        function setActive(clickedElement) {
            document.querySelectorAll('.nav-chip').forEach(el => {
                if (!el.classList.contains('danger')) {
                    el.classList.remove('active');
                }
            });
            clickedElement.classList.add('active');
        }

        // ── AUDIO PING ──────────────────────────
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function ping() {
            if (!audioCtx) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.15);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.4);
            } catch (e) {}
        }

        // Auto-init audio on first click
        document.addEventListener('click', function autoInit() {
            initAudio();
            document.removeEventListener('click', autoInit);
        }, { once: true });

        // ── TOAST ───────────────────────────────
        function showOrderToast(table, itemCount, total) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.style.cssText = `
                background: rgba(200, 135, 58, 0.95);
                color: #0b0a09;
                padding: 12px 18px;
                border-radius: 10px;
                font-family: 'DM Sans', sans-serif;
                font-size: 13px;
                font-weight: 600;
                box-shadow: 0 4px 20px rgba(0,0,0,0.4);
                animation: slideIn 0.3s ease;
                cursor: pointer;
                max-width: 320px;
            `;
            toast.innerHTML = `🔔 New Order — Table ${table}<br><span style="font-weight:400;font-size:12px">${itemCount} item(s) · ₹${total}</span>`;
            toast.onclick = () => {
                // Navigate iframe to kitchen
                document.getElementById('main-content').src = '/kitchen/' + USERNAME + '?embedded=true';
                document.querySelectorAll('.nav-chip').forEach(el => el.classList.remove('active'));
                toast.remove();
            };
            container.appendChild(toast);

            // Auto-remove after 8 seconds
            setTimeout(() => { if (toast.parentNode) toast.remove(); }, 8000);
        }

        // ── POLLING ─────────────────────────────
        async function pollOrders() {
            try {
                const res = await fetch('/kitchen_orders/' + USERNAME);
                const data = await res.json();
                const orders = data.orders || [];

                if (firstLoad) {
                    // On first load, just record existing IDs without notifying
                    orders.forEach(o => knownOrderIds.add(o.id));
                    firstLoad = false;
                } else {
                    // Check for new orders
                    orders.forEach(o => {
                        if (!knownOrderIds.has(o.id)) {
                            knownOrderIds.add(o.id);
                            showOrderToast(o.table, o.items.length, o.total);
                            ping();
                        }
                    });
                }
            } catch (e) {
                // Silently ignore network errors
            }
        }

        // Start polling every 5 seconds
        pollOrders();
        setInterval(pollOrders, 5000);
    </script>

    <style>
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to   { transform: translateX(0); opacity: 1; }
        }
    </style>

</body>

</html>
