<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Captain App</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0b0a09">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="icon" href="/static/logo.png" type="image/png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'DM Sans', system-ui, sans-serif;
            background: #0b0a09;
            color: #f2e8d9;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .login-card {
            width: 100%;
            max-width: 380px;
            text-align: center;
        }

        .app-icon {
            width: 88px;
            height: 88px;
            border-radius: 22px;
            margin: 0 auto 24px;
            background: linear-gradient(135deg, #c8873a 0%, #e0a050 50%, #8a5a20 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            box-shadow: 0 8px 32px rgba(200, 135, 58, 0.3);
        }

        .app-title {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 32px;
            font-weight: 700;
            color: #e0a050;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .app-subtitle {
            font-size: 14px;
            color: #b8a898;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        .input-group {
            position: relative;
            margin-bottom: 16px;
        }

        .code-input {
            width: 100%;
            padding: 16px 20px;
            background: #161412;
            border: 2px solid rgba(200, 135, 58, 0.18);
            border-radius: 14px;
            color: #f2e8d9;
            font-family: 'DM Sans', system-ui, sans-serif;
            font-size: 18px;
            font-weight: 600;
            text-align: center;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .code-input::placeholder {
            color: #b8a898;
            opacity: 0.5;
            text-transform: none;
            letter-spacing: 0.02em;
            font-weight: 400;
            font-size: 15px;
        }

        .code-input:focus {
            border-color: #c8873a;
            box-shadow: 0 0 0 3px rgba(200, 135, 58, 0.15);
        }

        .connect-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #c8873a, #e0a050);
            border: none;
            border-radius: 14px;
            color: #0b0a09;
            font-family: 'DM Sans', system-ui, sans-serif;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            cursor: pointer;
            transition: transform 0.1s, filter 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .connect-btn:active {
            transform: scale(0.98);
            filter: brightness(0.9);
        }

        .connect-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .error-msg {
            margin-top: 16px;
            padding: 12px 16px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 10px;
            color: #f87171;
            font-size: 13px;
            font-weight: 500;
            display: none;
        }

        .error-msg.show {
            display: block;
        }

        .remember-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
            font-size: 13px;
            color: #b8a898;
        }

        .remember-row input[type="checkbox"] {
            accent-color: #c8873a;
            width: 16px;
            height: 16px;
        }

        .footer-hint {
            position: fixed;
            bottom: 24px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 12px;
            color: rgba(184, 168, 152, 0.4);
            letter-spacing: 0.05em;
        }
    </style>
</head>

<body>

    <div class="login-card">
        <div
            style="display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 16px;">
            <div
                style="width: 80px; height: 80px; position: relative; margin-bottom: 12px; display: flex; align-items: center; justify-content: center;">
                <div
                    style="transform: scale(0.16); transform-origin: center; display: flex; align-items: center; justify-content: center;">
                    {% include 'sr_logo.html' %}
                </div>
            </div>
            <div class="app-title">Captain App</div>
            <div class="app-subtitle">Enter restaurant code to connect</div>
        </div>

        <div class="input-group">
            <input type="text" id="code-input" class="code-input" placeholder="e.g. ATITHI" autocomplete="off"
                autofocus>
        </div>

        <button class="connect-btn" id="connect-btn" onclick="connect()">
            <span id="btn-text">Connect</span>
            <span>→</span>
        </button>

        <div class="error-msg" id="error-msg">Restaurant not found. Please check the code.</div>

        <label class="remember-row">
            <input type="checkbox" id="remember" checked>
            Remember this restaurant
        </label>
    </div>

    <div class="footer-hint">Powered by QR Menu System</div>

    <script>
        const input = document.getElementById('code-input');
        const btn = document.getElementById('connect-btn');
        const errorMsg = document.getElementById('error-msg');

        // Auto-load saved restaurant code
        const saved = localStorage.getItem('captain_restaurant');
        if (saved) {
            // If remembered, go directly
            window.location.href = '/captain/' + saved;
        }

        input.addEventListener('keydown', e => {
            if (e.key === 'Enter') connect();
            errorMsg.classList.remove('show');
        });

        async function connect() {
            const code = input.value.trim();
            if (!code) { input.focus(); return; }

            btn.disabled = true;
            document.getElementById('btn-text').textContent = 'Connecting...';
            errorMsg.classList.remove('show');

            try {
                // Verify the restaurant exists
                const res = await fetch('/captain/' + encodeURIComponent(code), { method: 'HEAD' });

                if (res.ok) {
                    // Save if checkbox is checked
                    if (document.getElementById('remember').checked) {
                        localStorage.setItem('captain_restaurant', code);
                    }
                    window.location.href = '/captain/' + encodeURIComponent(code);
                } else {
                    errorMsg.classList.add('show');
                }
            } catch (e) {
                errorMsg.textContent = 'Network error. Please check your connection.';
                errorMsg.classList.add('show');
            } finally {
                btn.disabled = false;
                document.getElementById('btn-text').textContent = 'Connect';
            }
        }
    </script>

    {% include 'sr_footer.html' %}
</body>

</html>
