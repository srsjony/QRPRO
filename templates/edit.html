<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Item</title>

    <style>
        :root {
            --primary: #667eea;
            --primary-dark: #5366d7;
            --border: #d2d8ea;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 16px;
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #edf1ff, #f9fafc);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: #fff;
            padding: 20px;
            border-radius: 14px;
            width: min(460px, 100%);
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.12);
            border: 1px solid #e5e9f5;
            animation: fadeUp 0.45s ease both;
        }

        h2 {
            margin: 0 0 14px;
        }

        input {
            width: 100%;
            padding: 11px;
            margin: 8px 0;
            border-radius: 9px;
            border: 1px solid var(--border);
            font-size: 16px;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.14);
        }

        button {
            width: 100%;
            padding: 11px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 9px;
            margin-top: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, background 0.2s ease;
        }

        button:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        img {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 10px;
            max-height: 220px;
            object-fit: cover;
        }

        label {
            display: block;
            font-size: 14px;
            margin-top: 8px;
            color: #4f5877;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .card {
                padding: 16px;
                border-radius: 12px;
            }

            h2 {
                font-size: 22px;
            }
        }
    </style>

</head>

<body>

    <div class="card">

        <h2>Edit Item</h2>
        {% include 'flash_messages.html' %}

        {% if data[3] %}
        <img src="/static/uploads/{{data[3]}}" alt="Current image">
        {% endif %}

        <form method="POST" enctype="multipart/form-data">
            {% include 'csrf_field.html' %}

            <input name="item" value="{{data[0]}}" placeholder="Item" required>
            <input name="price" value="{{data[1]}}" placeholder="Price" required>
            <input name="category" value="{{data[2]}}" placeholder="Category" required>
            
            <label style="display:block; margin-top:12px; font-size:12px; color:#667eea; font-weight:600; text-transform:uppercase; letter-spacing:0.05em;">Inventory Tracking</label>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom: 8px;">
                <div>
                   <label style="font-size:11px; color:#6b7280; font-weight:500;">Current Stock (Leave blank for unlimited)</label>
                   <input type="number" min="0" name="stock" value="{{ '' if data[4] == -1 else data[4] }}" placeholder="e.g. 20">
                </div>
                <div>
                   <label style="font-size:11px; color:#6b7280; font-weight:500;">Daily Auto-Reset Limit (Leave blank for no reset)</label>
                   <input type="number" min="0" name="daily_limit" value="{{ '' if data[5] == -1 else data[5] }}" placeholder="e.g. 20">
                </div>
            </div>

            <label style="display:block; margin-top:12px; font-size:12px; color:#667eea; font-weight:600; text-transform:uppercase; letter-spacing:0.05em;">Change Image:</label>
            <input type="file" name="image" accept="image/png, image/jpeg, image/jpg">

            <button>Update</button>

        </form>

    </div>

    {% include 'sr_footer.html' %}
</body>

</html>
