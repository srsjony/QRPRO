<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<style>
:root {
    --primary: #667eea;
    --primary-dark: #5366d7;
    --bg1: #667eea;
    --bg2: #764ba2;
}

* {
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, var(--bg1), var(--bg2));
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    padding: 20px;
    position: relative;
    overflow: hidden;
}

body::before,
body::after {
    content: "";
    position: absolute;
    border-radius: 50%;
    filter: blur(8px);
    opacity: 0.22;
    animation: floatBlob 7s ease-in-out infinite;
}

body::before {
    width: 220px;
    height: 220px;
    background: #ffffff;
    top: -70px;
    right: -40px;
}

body::after {
    width: 180px;
    height: 180px;
    background: #f6f8ff;
    bottom: -55px;
    left: -30px;
    animation-delay: 1.2s;
}

.card {
    position: relative;
    z-index: 1;
    background: rgba(255, 255, 255, 0.96);
    backdrop-filter: blur(6px);
    padding: 26px;
    border-radius: 16px;
    width: min(360px, 100%);
    box-shadow: 0 16px 32px rgba(0,0,0,0.25);
    animation: fadeUp 0.5s ease both;
}

h2 {
    margin: 0 0 18px;
    text-align: center;
    font-size: 26px;
}

input {
    width: 100%;
    padding: 12px;
    margin: 9px 0;
    border-radius: 10px;
    border: 1px solid #d5d8e6;
    font-size: 16px;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
}

input:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 600;
    font-size: 15px;
    transition: transform 0.2s ease, background 0.2s ease;
}

button:hover {
    background: var(--primary-dark);
    transform: translateY(-1px);
}

a {
    display: block;
    text-align: center;
    margin-top: 12px;
    color: #4354c5;
    text-decoration: none;
    font-size: 14px;
}

a:hover {
    text-decoration: underline;
}

@keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes floatBlob {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(10px); }
}

@media (max-width: 480px) {
    body { padding: 14px; }
    .card { padding: 22px 16px; border-radius: 14px; }
    h2 { font-size: 23px; }
    input { font-size: 16px; }
}
</style>
</head>
<body>

<div class="card">
<h2>{% if register %}Register{% else %}Login{% endif %}</h2>

<form method="POST">
<input name="username" placeholder="Username" required>
<input name="password" placeholder="Password" type="password" required>
<input name="whatsapp" placeholder="WhatsApp Number (91XXXXXXXXXX)">
<button>Submit</button>
</form>

{% if not register %}
<a href="/register">Create Account</a>
{% endif %}
</div>

</body>
</html>
